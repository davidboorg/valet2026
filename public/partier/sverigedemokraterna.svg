<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Sverigedemokraterna: Anemone / Blue flower with yellow center -->
  <circle cx="50" cy="50" r="48" fill="#005BAA"/>
  <g>
    <!-- Petals -->
    <ellipse cx="50" cy="28" rx="10" ry="18" fill="#FECC02"/>
    <ellipse cx="30" cy="38" rx="10" ry="18" fill="#FECC02" transform="rotate(-50 30 38)"/>
    <ellipse cx="70" cy="38" rx="10" ry="18" fill="#FECC02" transform="rotate(50 70 38)"/>
    <ellipse cx="28" cy="58" rx="10" ry="16" fill="#FECC02" transform="rotate(-80 28 58)"/>
    <ellipse cx="72" cy="58" rx="10" ry="16" fill="#FECC02" transform="rotate(80 72 58)"/>
    <ellipse cx="40" cy="68" rx="10" ry="14" fill="#FECC02" transform="rotate(-110 40 68)"/>
    <ellipse cx="60" cy="68" rx="10" ry="14" fill="#FECC02" transform="rotate(110 60 68)"/>
    <!-- Center -->
    <circle cx="50" cy="50" r="12" fill="#005BAA"/>
    <circle cx="50" cy="50" r="6" fill="#FECC02"/>
  </g>
</svg>
