<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Valaffischmuseet">
  <!-- Stämpel-mark: kvadrat med "Va" i serif + årtal under -->
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Inre tunn linje för dubbelramen -->
  <rect x="5" y="5" width="54" height="54" fill="none" stroke="#C4654A" stroke-width="0.6" opacity="0.4"/>
  <!-- Stort italic V — det enda elementet som "rör sig" -->
  <text x="32" y="42"
        font-family="'EB Garamond', 'Tiempos Text', Georgia, serif"
        font-size="38"
        font-weight="600"
        font-style="italic"
        text-anchor="middle"
        fill="currentColor"
        letter-spacing="-0.02em">
    Va
  </text>
  <!-- Liten linje + årtal längst ned -->
  <line x1="20" y1="49" x2="44" y2="49" stroke="#C4654A" stroke-width="0.8"/>
  <text x="32" y="57"
        font-family="'IBM Plex Sans', system-ui, sans-serif"
        font-size="5"
        font-weight="500"
        text-anchor="middle"
        fill="#6B6560"
        letter-spacing="0.25em">
    MUSEUM
  </text>
</svg>
